name: 构建文档

on:
    push:
        branches: [ main ]

    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            -   name: 切换分支🀄
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: 使用 pnpm☂
                uses: pnpm/action-setup@v3
                with:
                    version: 9

            -   name: 使用 Node.js 🌠
                uses: actions/setup-node@v2
                with:
                    node-version: 25
                    cache: pnpm

            -   name: 安装依赖❄
                run: pnpm install

            -   name: 构建项目🚽
                run: pnpm run docs:build

            -   name: 同步到分支🚄
                uses: JamesIves/github-pages-deploy-action@v4
                with:
                    branch: production
                    folder: docs/.vuepress/dist
